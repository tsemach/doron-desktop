name: "Deploy Desktop"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy/release'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production
      tag_name:
        description: 'Tag name (e.g. v0.1.0). If empty, uses v__VERSION__'
        required: false
        type: string
        default: ''
  workflow_call:
    inputs:
      environment:
        description: 'Environment to deploy/release'
        required: true
        type: string
      tag_name:
        description: 'Tag name (e.g. v0.1.0)'
        required: false
        type: string
        default: ''

permissions:
  contents: write

jobs:
  publish-tauri:
    name: "Build and Release Tauri App"
    runs-on: windows-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: 'master'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./apps/desktop/src-tauri -> target"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Determine tag and release name
        id: vars
        shell: bash
        run: |
          TAG="${{ inputs.tag_name }}"
          if [ -z "$TAG" ]; then
            TAG="v__VERSION__"
            RELEASE="Release v__VERSION__"
          else
            RELEASE="Release $TAG"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "release=$RELEASE" >> "$GITHUB_OUTPUT"

      - name: Build and Release Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: "./apps/desktop"
          tagName: ${{ steps.vars.outputs.tag }}
          releaseName: ${{ steps.vars.outputs.release }}
          releaseDraft: false
          prerelease: ${{ inputs.environment == 'preview' }}
